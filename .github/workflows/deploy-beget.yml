name: Deploy to Beget

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Репозиторий = корень проекта. Заливка в каталог Bitrix /local на хостинге.
      #
      # ВАЖНО: server-dir у FTP-Deploy — путь ОТНОСИТЕЛЬНО стартовой папки FTP-аккаунта (куда попадаешь сразу после логина).
      # На Beget часто после входа ты УЖЕ в .../devcursor.sheer26.ru/public_html — тогда в секрет клади только:
      #   FTP_REMOTE_PATH = local
      # Если указать devcursor.sheer26.ru/public_html/local, получится вложенность:
      #   public_html/devcursor.sheer26.ru/public_html/local
      # Слэш на конце необязателен — ниже добавляется один /.
      - name: Deploy files to Beget via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: ./
          # FTP-Deploy-Action: server-dir обязан заканчиваться на /
          server-dir: ${{ endsWith(secrets.FTP_REMOTE_PATH, '/') && secrets.FTP_REMOTE_PATH || format('{0}/', secrets.FTP_REMOTE_PATH) }}
          protocol: ftp
          exclude: |
            **/.git*
            **/.github/**
            **/.idea/**
            **/.vscode/**
            **/node_modules/**
            **/.DS_Store
            **/Thumbs.db
            bitrix/**
            devbitrix-static-mirror/**
            serve.py
