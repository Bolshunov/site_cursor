name: Deploy to Beget

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Репозиторий = содержимое site-cursor/local. Заливка в каталог Bitrix /local на хостинге.
      # В GitHub → Settings → Secrets: FTP_REMOTE_PATH = devcursor.sheer26.ru/public_html/local
      # (без вложенного дубля devcursor.sheer26.ru/public_html/.../public_html)
      - name: Deploy files to Beget via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}
          protocol: ftp
          exclude: |
            **/.git*
            **/.github/**
            **/.idea/**
            **/.vscode/**
            **/node_modules/**
            **/.DS_Store
            **/Thumbs.db
            bitrix/**
            devbitrix-static-mirror/**
            serve.py
